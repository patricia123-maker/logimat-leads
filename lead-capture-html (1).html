<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LogiMAT Lead Capture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const PRIORITY_OPTIONS = [
  { value: "A (heißer Lead)", short: "A", label: "A – Heißer Lead", color: "bg-red-100 border-red-400 text-red-800" },
  { value: "B (Chance auf Deal in den nächsten 6 Monaten)", short: "B", label: "B – Chance in 6 Monaten", color: "bg-yellow-100 border-yellow-400 text-yellow-800" },
  { value: "C (grundsätzliches Interesse, nur loser Kontakt)", short: "C", label: "C – Loses Interesse", color: "bg-blue-100 border-blue-400 text-blue-800" },
];

const COLUMNS = [
  ["unternehmensname","Unternehmensname"],
  ["geschaeftsart","Geschäftsart"],
  ["branche","Branche"],
  ["prioritaet","Priorität"],
  ["mitarbeiter","Zuständiger Mitarbeiter"],
  ["leadstatus","Leadstatus"],
  ["anrede","Anrede"],
  ["vorname","Vorname"],
  ["nachname","Nachname"],
  ["jobbezeichnung","Jobbezeichnung"],
  ["telefon","Telefon"],
  ["handy","Handy"],
  ["email","E-Mail"],
  ["sprache","Bevorzugte Sprache"],
  ["linkedin","LinkedIn URL"],
  ["deal","Deal vorhanden?"],
  ["deal_anlegen","Deal anlegen?"],
  ["deal_phase","Deal-Phase"],
  ["doctype","DocType"],
  ["seitenvolumen","Seitenvolumen/Jahr"],
  ["notiz","Notiz inkl. Projektidee / Anwendungsfall"],
  ["aufgabe","Aufgabe"],
  ["faelligkeit","Fälligkeit"],
];

const EMPTY = Object.fromEntries(COLUMNS.map(([k]) => [k, ""]));
const DEFAULTS = { geschaeftsart: "Direktgeschäft", sprache: "Deutsch", deal: "Nein", deal_phase: "Discovery" };

function App() {
  const [view, setView] = useState("capture");
  const [leads, setLeads] = useState([]);
  const [current, setCurrent] = useState({ ...EMPTY, ...DEFAULTS });
  const [cardImage, setCardImage] = useState(null);
  const [cardPreview, setCardPreview] = useState(null);
  const [audioBlob, setAudioBlob] = useState(null);
  const [audioUrl, setAudioUrl] = useState(null);
  const [recording, setRecording] = useState(false);
  const [notes, setNotes] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [copied, setCopied] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [showTsv, setShowTsv] = useState(false);

  const mediaRef = useRef(null);
  const chunksRef = useRef([]);

  const toBase64 = (file) => new Promise((res, rej) => {
    const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file);
  });

  const handleImg = (e) => { const f = e.target.files[0]; if (!f) return; setCardImage(f); setCardPreview(URL.createObjectURL(f)); };
  const handleAudio = (e) => { const f = e.target.files[0]; if (!f) return; setAudioBlob(f); setAudioUrl(URL.createObjectURL(f)); };

  const startRec = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      chunksRef.current = [];
      mr.ondataavailable = e => chunksRef.current.push(e.data);
      mr.onstop = () => { const b = new Blob(chunksRef.current, { type: "audio/webm" }); setAudioBlob(b); setAudioUrl(URL.createObjectURL(b)); stream.getTracks().forEach(t => t.stop()); };
      mr.start(); mediaRef.current = mr; setRecording(true);
    } catch { setError("Mikrofonzugriff nicht möglich."); }
  };
  const stopRec = () => { mediaRef.current?.stop(); setRecording(false); };

  const analyse = async () => {
    setLoading(true); setError("");
    try {
      const parts = [];
      if (cardImage) {
        const b64 = await toBase64(cardImage);
        parts.push({ type: "image", source: { type: "base64", media_type: cardImage.type || "image/jpeg", data: b64 } });
        parts.push({ type: "text", text: "Visitenkarte vom Messestand." });
      }
      if (notes) parts.push({ type: "text", text: `Gesprächsnotizen: ${notes}` });
      parts.push({ type: "text", text: `Du bist CRM-Assistent für ein B2B-Unternehmen das Dokumentenverarbeitungs-/OCR-Software verkauft.
Extrahiere einen Lead. Antworte NUR mit JSON, kein Markdown:
{"unternehmensname":"","geschaeftsart":"Direktgeschäft","branche":"Englische Branche","mitarbeiter":"","leadstatus":"Sales ready oder In Bearbeitung","anrede":"Herr/Frau","vorname":"","nachname":"","jobbezeichnung":"","telefon":"","handy":"","email":"","sprache":"Deutsch oder English","linkedin":"","deal":"Nein","deal_anlegen":"Ja oder Nein","deal_phase":"Discovery","doctype":"","seitenvolumen":"","notiz":"Ausführliche Zusammenfassung","aufgabe":"","faelligkeit":""}` });

      const API_KEY = "HIER_DEINEN_KEY_EINTRAGEN"; // sk-ant-...
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json", "x-api-key": API_KEY, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1500, messages: [{ role: "user", content: parts }] })
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content?.find(b => b.type === "text")?.text || "";
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      setCurrent(c => ({ ...c, ...parsed }));
      setView("review");
    } catch (e) { setError("Fehler: " + e.message); }
    setLoading(false);
  };

  const saveLead = () => {
    if (editIdx !== null) { setLeads(ls => ls.map((l, i) => i === editIdx ? { ...current } : l)); setEditIdx(null); }
    else setLeads(ls => [...ls, { ...current }]);
    setCurrent({ ...EMPTY, ...DEFAULTS });
    setCardImage(null); setCardPreview(null); setAudioBlob(null); setAudioUrl(null); setNotes("");
    setView("capture");
  };

  const editLead = (i) => { setEditIdx(i); setCurrent({ ...leads[i] }); setView("review"); };
  const deleteLead = (i) => setLeads(ls => ls.filter((_, idx) => idx !== i));

  const allTsv = leads.map(l => COLUMNS.map(([k]) => (l[k] || "").replace(/\t/g, " ").replace(/\n/g, " ")).join("\t")).join("\n");

  const copyAll = () => {
    try {
      const ta = document.createElement("textarea");
      ta.value = allTsv; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(() => setCopied(false), 3000);
    } catch { setShowTsv(true); }
  };

  const pShort = (v) => PRIORITY_OPTIONS.find(p => p.value === v)?.short || "–";
  const pColor = (v) => PRIORITY_OPTIONS.find(p => p.value === v)?.color || "bg-slate-100 border-slate-300 text-slate-600";

  const gradBg = { background: "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "1rem" };

  // ── CAPTURE ──────────────────────────────────────────────────────────────
  if (view === "capture") return (
    <div style={gradBg}>
      <div style={{background:"#fff",borderRadius:"1.25rem",boxShadow:"0 25px 50px rgba(0,0,0,0.4)",width:"100%",maxWidth:"440px",padding:"1.75rem"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.25rem"}}>
          <div>
            <h1 style={{fontSize:"1.25rem",fontWeight:700,color:"#1e293b",margin:0}}>🎪 Lead erfassen</h1>
            <p style={{fontSize:"0.75rem",color:"#94a3b8",margin:"0.2rem 0 0"}}>LogiMAT Lead Capture</p>
          </div>
          {leads.length > 0 && (
            <button onClick={() => setView("list")} style={{background:"#eff6ff",color:"#1d4ed8",border:"none",borderRadius:"0.5rem",padding:"0.4rem 0.75rem",fontSize:"0.75rem",fontWeight:600,cursor:"pointer"}}>
              📋 Liste ({leads.length})
            </button>
          )}
        </div>

        {/* Visitenkarte */}
        <div style={{marginBottom:"1rem"}}>
          <label style={{display:"block",fontSize:"0.875rem",fontWeight:600,color:"#374151",marginBottom:"0.35rem"}}>📷 Visitenkarte</label>
          {cardPreview
            ? <div style={{position:"relative"}}>
                <img src={cardPreview} style={{width:"100%",borderRadius:"0.5rem",border:"1px solid #e2e8f0",objectFit:"cover",maxHeight:"130px"}} />
                <button onClick={() => { setCardImage(null); setCardPreview(null); }} style={{position:"absolute",top:"4px",right:"4px",background:"#fff",border:"none",borderRadius:"999px",padding:"2px 8px",fontSize:"0.75rem",color:"#ef4444",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}>✕</button>
              </div>
            : <label style={{display:"flex",alignItems:"center",justifyContent:"center",width:"100%",border:"2px dashed #cbd5e1",borderRadius:"0.5rem",padding:"1.25rem 0",fontSize:"0.875rem",color:"#94a3b8",cursor:"pointer",boxSizing:"border-box"}}>
                📸 Foto aufnehmen oder hochladen
                <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleImg} />
              </label>
          }
        </div>

        {/* Sprachnotiz */}
        <div style={{marginBottom:"1rem"}}>
          <label style={{display:"block",fontSize:"0.875rem",fontWeight:600,color:"#374151",marginBottom:"0.35rem"}}>🎙️ Sprachnotiz <span style={{fontWeight:400,color:"#94a3b8",fontSize:"0.75rem"}}>(optional)</span></label>
          <div style={{display:"flex",gap:"0.5rem"}}>
            {!recording
              ? <button onClick={startRec} style={{flex:1,background:"#f1f5f9",border:"none",borderRadius:"0.5rem",padding:"0.5rem",fontSize:"0.875rem",fontWeight:500,cursor:"pointer"}}>● Aufnahme starten</button>
              : <button onClick={stopRec} style={{flex:1,background:"#fee2e2",color:"#b91c1c",border:"none",borderRadius:"0.5rem",padding:"0.5rem",fontSize:"0.875rem",fontWeight:500,cursor:"pointer"}}>■ Stopp</button>
            }
            <label style={{flex:1,background:"#f1f5f9",border:"none",borderRadius:"0.5rem",padding:"0.5rem",fontSize:"0.875rem",fontWeight:500,cursor:"pointer",textAlign:"center"}}>
              ↑ Audio-Datei
              <input type="file" accept="audio/*" style={{display:"none"}} onChange={handleAudio} />
            </label>
          </div>
          {audioUrl && <audio src={audioUrl} controls style={{width:"100%",marginTop:"0.5rem",height:"32px"}} />}
        </div>

        {/* Notizen */}
        <div style={{marginBottom:"1.25rem"}}>
          <label style={{display:"block",fontSize:"0.875rem",fontWeight:600,color:"#374151",marginBottom:"0.35rem"}}>📝 Notizen <span style={{fontWeight:400,color:"#94a3b8",fontSize:"0.75rem"}}>(optional)</span></label>
          <textarea style={{width:"100%",border:"1px solid #cbd5e1",borderRadius:"0.5rem",padding:"0.5rem 0.75rem",fontSize:"0.875rem",resize:"none",boxSizing:"border-box",fontFamily:"inherit"}}
            rows={3} placeholder="Interesse an Lieferscheinverarbeitung, 3 Standorte, Demo gewünscht…"
            value={notes} onChange={e => setNotes(e.target.value)} />
        </div>

        {error && <p style={{color:"#ef4444",fontSize:"0.875rem",marginBottom:"0.75rem"}}>{error}</p>}

        <div style={{display:"flex",gap:"0.5rem"}}>
          <button disabled={loading || (!cardImage && !audioBlob && !notes.trim())} onClick={analyse}
            style={{flex:1,background:loading||(!cardImage&&!audioBlob&&!notes.trim())?"#cbd5e1":"#2563eb",color:"#fff",border:"none",borderRadius:"0.5rem",padding:"0.75rem",fontSize:"0.875rem",fontWeight:600,cursor:loading?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.5rem"}}>
            {loading ? "⏳ KI liest… (ca. 10 Sek.)" : "✨ KI analysieren"}
          </button>
          <button onClick={() => { setCurrent({ ...EMPTY, ...DEFAULTS }); setView("review"); }}
            style={{background:"#f1f5f9",border:"none",borderRadius:"0.5rem",padding:"0.75rem 1rem",fontSize:"0.875rem",fontWeight:600,cursor:"pointer",color:"#475569"}}>
            ✏️ Manuell
          </button>
        </div>
      </div>
    </div>
  );

  // ── REVIEW ───────────────────────────────────────────────────────────────
  if (view === "review") return (
    <div style={gradBg}>
      <div style={{background:"#fff",borderRadius:"1.25rem",boxShadow:"0 25px 50px rgba(0,0,0,0.4)",width:"100%",maxWidth:"440px",padding:"1.75rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"1.25rem"}}>
          <button onClick={() => { setView("capture"); setEditIdx(null); }} style={{background:"none",border:"none",color:"#94a3b8",fontSize:"1.25rem",cursor:"pointer",padding:0}}>←</button>
          <h1 style={{fontSize:"1.25rem",fontWeight:700,color:"#1e293b",margin:0}}>{editIdx !== null ? "Lead bearbeiten" : "Lead prüfen"}</h1>
        </div>

        {/* Priorität */}
        <div style={{marginBottom:"1rem"}}>
          <label style={{display:"block",fontSize:"0.875rem",fontWeight:600,color:"#374151",marginBottom:"0.5rem"}}>Priorität</label>
          <div style={{display:"flex",gap:"0.5rem"}}>
            {PRIORITY_OPTIONS.map(p => (
              <button key={p.value} onClick={() => setCurrent(c => ({ ...c, prioritaet: p.value }))}
                style={{flex:1,border:`2px solid ${current.prioritaet===p.value?"#f87171":"#e2e8f0"}`,borderRadius:"0.5rem",padding:"0.5rem",fontSize:"0.875rem",fontWeight:700,cursor:"pointer",
                  background:current.prioritaet===p.value?(p.short==="A"?"#fee2e2":p.short==="B"?"#fef9c3":"#dbeafe"):"#fff",
                  color:current.prioritaet===p.value?(p.short==="A"?"#b91c1c":p.short==="B"?"#92400e":"#1e40af"):"#94a3b8"}}>
                {p.short}
              </button>
            ))}
          </div>
          {current.prioritaet && <p style={{fontSize:"0.75rem",color:"#64748b",marginTop:"0.25rem"}}>{PRIORITY_OPTIONS.find(p=>p.value===current.prioritaet)?.label}</p>}
        </div>

        {/* Felder */}
        <div style={{maxHeight:"300px",overflowY:"auto",marginBottom:"1rem",paddingRight:"4px"}}>
          {COLUMNS.filter(([k]) => k !== "prioritaet").map(([k, label]) => (
            <div key={k} style={{display:"flex",alignItems:"flex-start",gap:"0.5rem",marginBottom:"0.4rem"}}>
              <span style={{fontSize:"0.7rem",color:"#94a3b8",width:"6rem",flexShrink:0,paddingTop:"6px"}}>{label}</span>
              {k === "notiz" || k === "aufgabe"
                ? <textarea style={{flex:1,border:"1px solid #e2e8f0",borderRadius:"0.25rem",padding:"4px 8px",fontSize:"0.75rem",resize:"none",fontFamily:"inherit",boxSizing:"border-box"}} rows={2}
                    value={current[k]||""} onChange={e => setCurrent(c=>({...c,[k]:e.target.value}))} />
                : <input style={{flex:1,border:"1px solid #e2e8f0",borderRadius:"0.25rem",padding:"4px 8px",fontSize:"0.75rem",fontFamily:"inherit",boxSizing:"border-box",width:0}}
                    value={current[k]||""} onChange={e => setCurrent(c=>({...c,[k]:e.target.value}))} />
              }
            </div>
          ))}
        </div>

        <button onClick={saveLead}
          style={{width:"100%",background:"#16a34a",color:"#fff",border:"none",borderRadius:"0.5rem",padding:"0.75rem",fontSize:"0.875rem",fontWeight:600,cursor:"pointer"}}>
          {editIdx !== null ? "✅ Änderungen speichern" : `✅ Lead speichern (${leads.length+1}. Lead)`}
        </button>
      </div>
    </div>
  );

  // ── LIST ─────────────────────────────────────────────────────────────────
  return (
    <div style={gradBg}>
      <div style={{background:"#fff",borderRadius:"1.25rem",boxShadow:"0 25px 50px rgba(0,0,0,0.4)",width:"100%",maxWidth:"440px",padding:"1.75rem"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.25rem"}}>
          <div>
            <h1 style={{fontSize:"1.25rem",fontWeight:700,color:"#1e293b",margin:0}}>📋 Alle Leads</h1>
            <p style={{fontSize:"0.75rem",color:"#94a3b8",margin:"0.2rem 0 0"}}>{leads.length} Lead{leads.length!==1?"s":""} erfasst</p>
          </div>
          <button onClick={() => setView("capture")} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:"0.5rem",padding:"0.4rem 0.75rem",fontSize:"0.75rem",fontWeight:600,cursor:"pointer"}}>
            + Neuer Lead
          </button>
        </div>

        <div style={{maxHeight:"280px",overflowY:"auto",marginBottom:"1rem",paddingRight:"4px"}}>
          {leads.map((l, i) => (
            <div key={i} style={{border:"1px solid #e2e8f0",borderRadius:"0.5rem",padding:"0.65rem",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"0.5rem",marginBottom:"0.5rem"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:"0.4rem",marginBottom:"2px"}}>
                  <span style={{fontSize:"0.7rem",fontWeight:700,padding:"1px 6px",borderRadius:"4px",border:"1px solid",
                    background:l.prioritaet?.startsWith("A")?"#fee2e2":l.prioritaet?.startsWith("B")?"#fef9c3":"#dbeafe",
                    color:l.prioritaet?.startsWith("A")?"#b91c1c":l.prioritaet?.startsWith("B")?"#92400e":"#1e40af",
                    borderColor:l.prioritaet?.startsWith("A")?"#fca5a5":l.prioritaet?.startsWith("B")?"#fde68a":"#93c5fd"}}>
                    {pShort(l.prioritaet)}
                  </span>
                  <span style={{fontSize:"0.875rem",fontWeight:600,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.unternehmensname||"–"}</span>
                </div>
                <p style={{fontSize:"0.75rem",color:"#64748b",margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{[l.vorname,l.nachname].filter(Boolean).join(" ")}{l.jobbezeichnung?` · ${l.jobbezeichnung}`:""}</p>
                {l.notiz&&<p style={{fontSize:"0.7rem",color:"#94a3b8",margin:"2px 0 0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.notiz}</p>}
              </div>
              <div style={{display:"flex",gap:"4px",flexShrink:0}}>
                <button onClick={() => editLead(i)} style={{background:"#f1f5f9",border:"none",borderRadius:"4px",padding:"4px 8px",fontSize:"0.75rem",cursor:"pointer"}}>✏️</button>
                <button onClick={() => deleteLead(i)} style={{background:"#fef2f2",color:"#ef4444",border:"none",borderRadius:"4px",padding:"4px 8px",fontSize:"0.75rem",cursor:"pointer"}}>✕</button>
              </div>
            </div>
          ))}
        </div>

        {/* Export */}
        <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:"0.75rem",padding:"0.875rem"}}>
          <p style={{fontSize:"0.75rem",fontWeight:600,color:"#374151",margin:"0 0 0.25rem"}}>📊 Export nach Google Sheets</p>
          <p style={{fontSize:"0.7rem",color:"#94a3b8",margin:"0 0 0.75rem"}}>Sheet öffnen → letzte leere Zeile anklicken → <strong>Strg+V</strong></p>
          <div style={{display:"flex",gap:"0.5rem",marginBottom: showTsv?"0.75rem":"0"}}>
            <a href="https://docs.google.com/spreadsheets/d/1fwuxLCWBRlRZwhOPuNppwAv8YUd7pRdyyqcR_xCAGls/edit" target="_blank"
              style={{flex:1,background:"#fff",border:"1px solid #cbd5e1",borderRadius:"0.5rem",padding:"0.5rem",fontSize:"0.75rem",fontWeight:600,color:"#475569",textAlign:"center",textDecoration:"none",display:"block"}}>
              📊 Sheet öffnen
            </a>
            <button onClick={copyAll} disabled={leads.length===0}
              style={{flex:1,background:leads.length===0?"#cbd5e1":"#2563eb",color:"#fff",border:"none",borderRadius:"0.5rem",padding:"0.5rem",fontSize:"0.75rem",fontWeight:600,cursor:leads.length===0?"default":"pointer"}}>
              {copied?"✓ Kopiert!":"📋 Alle kopieren"}
            </button>
          </div>
          {showTsv && (
            <div>
              <p style={{fontSize:"0.7rem",color:"#92400e",margin:"0 0 0.35rem"}}>⚠️ Automatisches Kopieren nicht möglich – manuell markieren und kopieren:</p>
              <textarea readOnly style={{width:"100%",fontSize:"0.65rem",fontFamily:"monospace",border:"1px solid #e2e8f0",borderRadius:"4px",padding:"6px",boxSizing:"border-box",height:"80px",resize:"none"}}
                value={allTsv} onFocus={e => e.target.select()} />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
